<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VMSforSEA</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: black;
      font-family: sans-serif;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(55%);
    }

    .overlay-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      text-align: center;
      font-size: 1.4rem;
      line-height: 1.7;
      padding: 0 5%;
      word-break: keep-all;
    }

    .overlay-text a {
      color: #5cbcff;
      text-decoration: none;
    }

    .overlay-text a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .overlay-text {
        font-size: 1rem;
        line-height: 1.5;
      }
    }

    @media (max-width: 480px) {
      .overlay-text {
        font-size: 0.9rem;
        line-height: 1.4;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <video autoplay muted loop playsinline>
      <source src="video/intro.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>

    <div class="overlay-text">
      <p>The VMS Holdings website is currently<br />undergoing renewal.</p>
      <p>
        For inquiries, contact us at 
        <a href="tel:+82514030790">+82-51-403-0790</a><br />
        or <a href="mailto:vmsholdings@vmsforsea.com">vmsholdings@vmsforsea.com</a>
      </p>
      <p>If you are a contracted client,<br />please reach out through our hotline.<br />Thank you.</p>
    </div>
  </div>
</body>
</html>
