<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VMS Holdings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      font-family: Arial, sans-serif;
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 1480px;
      aspect-ratio: 16 / 9;
      border: 1px solid #9747FF;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.45);
      z-index: 1;
    }

    .text-overlay {
      position: absolute;
      top: 5%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      text-align: center;
      padding: 0 20px;
      width: 100%;
      max-width: 90%;
    }

    .text-overlay p {
      margin-bottom: 12px;
      font-size: 1.1rem;
      line-height: 1.6;
      color: #fff;
      word-break: keep-all;
    }

    .text-overlay a {
      color: #4daaff;
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .text-overlay p {
        font-size: 1rem;
        line-height: 1.5;
      }

      .container {
        aspect-ratio: 4 / 3;
      }
    }

    @media (max-width: 480px) {
      .text-overlay p {
        font-size: 0.9rem;
      }

      .container {
        aspect-ratio: 3 / 4;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <video autoplay muted loop playsinline>
      <source src="video/intro.mp4" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
    <div class="overlay"></div>
    <div class="text-overlay">
      <p>The VMS Holdings website is currently undergoing renewal.</p>
      <p>
        For inquiries, contact us at
        <a href="tel:+82514030790">+82-51-403-0790</a> or
        <a href="mailto:vmsholdings@vmsforsea.com">vmsholdings@vmsforsea.com</a>.
      </p>
      <p>If you are a contracted client, please reach out through our hotline.<br>Thank you.</p>
    </div>
  </div>
</body>
</html>
